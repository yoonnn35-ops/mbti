<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏫 학교생활 MBTI 테스트</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Pretendard',sans-serif;
}

body{
    background:linear-gradient(135deg,#FFF7F2,#F8F6FF,#F0FBFF);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
}

.container{
    width:100%;
    max-width:700px;
    background:white;
    border-radius:25px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
    padding:40px;
}

h1{
    text-align:center;
    color:#555;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#888;
    margin-bottom:30px;
}

.progress{
    width:100%;
    height:10px;
    background:#eee;
    border-radius:20px;
    overflow:hidden;
    margin-bottom:25px;
}

.bar{
    height:100%;
    width:0%;
    background:#B7D8FF;
    transition:.4s;
}

.question{
    font-size:22px;
    text-align:center;
    color:#444;
    margin-bottom:30px;
    line-height:1.5;
}

button{
    width:100%;
    padding:18px;
    margin:12px 0;
    border:none;
    border-radius:15px;
    font-size:18px;
    cursor:pointer;
    transition:.25s;
}

.yes{
    background:#CDEBFF;
}

.no{
    background:#FFE0E8;
}

button:hover{
    transform:translateY(-2px);
    opacity:.9;
}

.result{
    display:none;
    text-align:center;
}

.result h2{
    font-size:42px;
    color:#5A6;
    margin:15px 0;
}

.result p{
    margin:10px 0;
    line-height:1.8;
    color:#555;
}

.restart{
    margin-top:25px;
    background:#D8F5D0;
}

.badge{
    display:inline-block;
    padding:10px 18px;
    border-radius:30px;
    background:#FFF3C9;
    margin-bottom:15px;
    font-size:18px;
}

@media(max-width:600px){
.container{
padding:25px;
}
.question{
font-size:20px;
}
}
</style>

</head>
<body>

<div class="container">

<div id="quiz">

<h1>🏫 학교생활 MBTI 테스트</h1>
<p class="subtitle">학교에서의 모습을 바탕으로 MBTI를 알아보자! 📚✨</p>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div class="question" id="question"></div>

<button class="yes" onclick="answer(1)">😊 A. 이쪽이 더 나다!</button>
<button class="no" onclick="answer(0)">😆 B. 이쪽이 더 나다!</button>

</div>

<div class="result" id="result">
<div class="badge">🎉 결과가 나왔어요!</div>
<h2 id="mbti"></h2>
<p id="description"></p>

<button class="restart" onclick="location.reload()">🔄 다시 하기</button>
</div>

</div>

<script>

const questions=[

{
q:"🙋 발표 시간이 되면?",
A:"손을 들고 발표해도 괜찮다",
B:"발표는 최대한 피하고 싶다",
type:"EI"
},

{
q:"🍱 점심시간에는?",
A:"친구들과 함께 먹는다",
B:"조용한 분위기가 좋다",
type:"EI"
},

{
q:"📝 시험공부는?",
A:"계획을 세워 차근차근 한다",
B:"마감 직전에 집중한다",
type:"JP"
},

{
q:"📅 수행평가 일정이 생기면?",
A:"바로 시작한다",
B:"나중에 해도 괜찮다",
type:"JP"
},

{
q:"🔬 과학 실험에서는?",
A:"정해진 방법대로 한다",
B:"새로운 방법도 시도해보고 싶다",
type:"SN"
},

{
q:"📖 문제를 풀 때",
A:"경험과 사실을 믿는다",
B:"아이디어와 가능성을 본다",
type:"SN"
},

{
q:"🤝 친구가 고민 상담을 하면?",
A:"현실적인 해결책을 알려준다",
B:"먼저 공감해준다",
type:"TF"
},

{
q:"⚽ 조별활동에서 갈등이 생기면?",
A:"효율적으로 해결한다",
B:"분위기를 먼저 생각한다",
type:"TF"
}

];

let current=0;

let score={
E:0,
I:0,
S:0,
N:0,
T:0,
F:0,
J:0,
P:0
};

function load(){

document.getElementById("question").innerHTML=
questions[current].q+
"<br><br>🅰️ "+questions[current].A+
"<br><br>🅱️ "+questions[current].B;

document.getElementById("bar").style.width=
(current/questions.length*100)+"%";

}

function answer(choice){

let t=questions[current].type;

switch(t){

case "EI":
choice?score.E++:score.I++;
break;

case "SN":
choice?score.S++:score.N++;
break;

case "TF":
choice?score.T++:score.F++;
break;

case "JP":
choice?score.J++:score.P++;
break;

}

current++;

if(current<questions.length){

load();

}else{

showResult();

}

}

function showResult(){

document.getElementById("quiz").style.display="none";
document.getElementById("result").style.display="block";

document.getElementById("bar").style.width="100%";

let mbti="";

mbti+=(score.E>=score.I)?"E":"I";
mbti+=(score.S>=score.N)?"S":"N";
mbti+=(score.T>=score.F)?"T":"F";
mbti+=(score.J>=score.P)?"J":"P";

document.getElementById("mbti").innerHTML="🌈 "+mbti;

const desc={

INTJ:"📚 전략적인 학습가! 혼자 깊이 탐구하는 것을 좋아해요.",

INTP:"💡 호기심이 많고 새로운 아이디어를 즐기는 탐구형!",

ENTJ:"🚀 리더십이 뛰어나 조별활동에서도 중심이 되는 편!",

ENTP:"✨ 창의적인 아이디어 뱅크! 토론을 즐겨요.",

INFJ:"🌸 배려심이 깊고 친구들의 고민을 잘 들어주는 타입!",

INFP:"🎨 감성이 풍부하고 자신만의 가치관이 뚜렷해요.",

ENFJ:"😊 모두를 챙기는 따뜻한 반장 스타일!",

ENFP:"🎉 활발하고 새로운 친구를 쉽게 사귀는 인기쟁이!",

ISTJ:"📖 성실하고 계획적인 모범생 스타일!",

ISFJ:"🍀 책임감이 강하고 친구들을 잘 도와줘요.",

ESTJ:"📋 체계적이고 조별활동에서 일을 잘 정리해요.",

ESFJ:"💗 친절하고 협동심이 뛰어난 학교생활의 분위기 메이커!",

ISTP:"🔧 직접 해보며 배우는 것을 좋아하는 실전형!",

ISFP:"🌷 차분하고 따뜻한 감성의 평화주의자!",

ESTP:"⚡ 활동적이고 학교 행사에서 빛나는 타입!",

ESFP:"🎤 밝고 에너지 넘치는 학교의 분위기 메이커!"

};

document.getElementById("description").innerHTML=
desc[mbti];

}

load();

</script>

</body>
</html>
