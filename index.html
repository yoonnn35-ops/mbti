<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏫 학교생활 MBTI 테스트</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Pretendard,sans-serif}
body{background:linear-gradient(135deg,#FFF7F2,#F8F6FF,#F0FBFF);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:30px}
.container{width:100%;max-width:700px;background:#fff;border-radius:25px;box-shadow:0 10px 30px rgba(0,0,0,.08);padding:40px}
h1{text-align:center;color:#555;margin-bottom:10px}.subtitle{text-align:center;color:#888;margin-bottom:30px}
.progress{width:100%;height:10px;background:#eee;border-radius:20px;overflow:hidden;margin-bottom:25px}
.bar{height:100%;width:0;background:#B7D8FF;transition:.4s}
.question{font-size:22px;text-align:center;color:#444;margin-bottom:30px;line-height:1.5}
.answers{display:flex;flex-direction:column;gap:15px}
.choice{width:100%;padding:18px;border:none;border-radius:18px;font-size:18px;cursor:pointer;transition:.25s;text-align:left;box-shadow:0 8px 20px rgba(0,0,0,.08)}
.choice:hover{transform:translateY(-3px) scale(1.01)}
#a{background:linear-gradient(135deg,#FFE5EC,#FFF4D9)}
#b{background:linear-gradient(135deg,#DDF3FF,#E8FFE6)}
.result{display:none;text-align:center}.badge{display:inline-block;padding:10px 18px;border-radius:30px;background:#FFF3C9;margin-bottom:15px}
.restart{margin-top:20px;padding:14px 20px;border:none;border-radius:14px;background:#D8F5D0;cursor:pointer}
</style></head><body>
<div class="container"><div id="quiz">
<h1>🏫 학교생활 MBTI 테스트</h1>
<p class="subtitle">학교에서의 모습을 바탕으로 MBTI를 알아보자! 📚✨</p>
<div class="progress"><div class="bar" id="bar"></div></div>
<div class="question" id="question"></div>
<div class="answers">
<button id="a" class="choice" onclick="answer(1)"></button>
<button id="b" class="choice" onclick="answer(0)"></button>
</div></div>
<div class="result" id="result">
<div class="badge">🎉 결과가 나왔어요!</div>
<h2 id="mbti"></h2>
<div id="description"></div>
<button class="restart" onclick="location.reload()">🔄 다시 하기</button>
</div></div>
<script>
const questions=[
{q:"🙋 발표 시간이 되면?",A:"손을 들고 발표해도 괜찮다",B:"발표는 최대한 피하고 싶다",type:"EI"},
{q:"🍱 점심시간에는?",A:"친구들과 함께 먹는다",B:"조용한 분위기가 좋다",type:"EI"},
{q:"📝 시험공부는?",A:"계획을 세워 차근차근 한다",B:"마감 직전에 집중한다",type:"JP"},
{q:"📅 수행평가 일정이 생기면?",A:"바로 시작한다",B:"나중에 해도 괜찮다",type:"JP"},
{q:"🔬 과학 실험에서는?",A:"정해진 방법대로 한다",B:"새로운 방법도 시도해보고 싶다",type:"SN"},
{q:"📖 문제를 풀 때",A:"경험과 사실을 믿는다",B:"아이디어와 가능성을 본다",type:"SN"},
{q:"🤝 친구가 고민 상담을 하면?",A:"현실적인 해결책을 알려준다",B:"먼저 공감해준다",type:"TF"},
{q:"⚽ 조별활동에서 갈등이 생기면?",A:"효율적으로 해결한다",B:"분위기를 먼저 생각한다",type:"TF"}];
let current=0,score={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};
function load(){let q=questions[current];question.innerHTML=q.q;a.innerHTML="🌸 "+q.A;b.innerHTML="🌼 "+q.B;bar.style.width=(current/questions.length*100)+"%";}
function answer(c){let t=questions[current].type;if(t=="EI")c?score.E++:score.I++;if(t=="SN")c?score.S++:score.N++;if(t=="TF")c?score.T++:score.F++;if(t=="JP")c?score.J++:score.P++;current++;current<questions.length?load():showResult();}
function pct(x,y){return x+y===0?50:Math.round(x/(x+y)*100);}
function showResult(){
quiz.style.display="none";result.style.display="block";
let mbti=(score.E>=score.I?"E":"I")+(score.S>=score.N?"S":"N")+(score.T>=score.F?"T":"F")+(score.J>=score.P?"J":"P");
mbti.innerHTML="🌈 "+mbti;
document.getElementById("mbti").innerHTML="🌈 "+mbti;
const desc={INTJ:"📚 전략적인 학습가!",INTP:"💡 호기심이 많은 탐구형!",ENTJ:"🚀 리더형!",ENTP:"✨ 아이디어 뱅크!",INFJ:"🌸 배려심이 깊어요!",INFP:"🎨 감성파!",ENFJ:"😊 따뜻한 리더!",ENFP:"🎉 활발한 분위기 메이커!",ISTJ:"📖 성실한 모범생!",ISFJ:"🍀 책임감이 강해요!",ESTJ:"📋 체계적인 리더!",ESFJ:"💗 친절한 협력가!",ISTP:"🔧 실전형!",ISFP:"🌷 평화주의자!",ESTP:"⚡ 활동적!",ESFP:"🎤 에너지 넘침!"};
description.innerHTML=`<p>${desc[mbti]}</p><hr style="margin:20px 0"><h3>📊 성향 비율</h3>
<p>🩷 E ${pct(score.E,score.I)}% | I ${100-pct(score.E,score.I)}%</p>
<p>💛 S ${pct(score.S,score.N)}% | N ${100-pct(score.S,score.N)}%</p>
<p>💚 T ${pct(score.T,score.F)}% | F ${100-pct(score.T,score.F)}%</p>
<p>💙 J ${pct(score.J,score.P)}% | P ${100-pct(score.J,score.P)}%</p>`;
}
load();
</script></body></html>
